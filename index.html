<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>GlowCity AAA</title>
  <meta name="theme-color" content="#0a0f18" />
  <style>
    :root{
      --bg:#05070b;
      --panel:rgba(10,14,22,.82);
      --border:rgba(255,255,255,.12);
      --text:#f4f7fb;
      --muted:#9aa8bd;
      --accent:#00d7ff;
      --ok:#37e18d;
      --warn:#ffcb46;
      --danger:#ff4e4e;
      --blue:#58a8ff;
      --purple:#b56cff;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;width:100%;height:100%;overflow:hidden;
      background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif
    }
    canvas{display:block}
    .panel{
      position:fixed;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:14px;
      backdrop-filter:blur(10px);
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      z-index:20;
    }
    #boot{
      position:fixed;inset:0;z-index:1000;display:grid;place-items:center;
      background:radial-gradient(circle at center, rgba(18,24,36,.96), rgba(5,7,11,.98));
    }
    #bootInner{width:min(460px,88vw);text-align:center}
    #bootTitle{font-size:clamp(30px,6vw,62px);margin:0 0 10px 0}
    #bootSub{margin:0 0 18px 0;color:rgba(255,255,255,.82)}
    #bootBar{height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
    #bootFill{height:100%;width:0%;background:linear-gradient(90deg,#ff4545,#ff9d33)}
    #bootBtn{
      margin-top:18px;padding:14px 24px;border:none;border-radius:12px;
      background:#ff3b3b;color:#fff;font-size:16px;font-weight:700;cursor:pointer;
    }
    #hud{top:12px;left:12px;min-width:305px;padding:12px 14px;font-size:14px;line-height:1.55}
    #help{top:12px;right:12px;max-width:340px;padding:12px 14px;font-size:13px;line-height:1.5;color:var(--muted)}
    #missionBox{
      left:50%;bottom:16px;transform:translateX(-50%);
      min-width:360px;max-width:72vw;padding:10px 14px;text-align:center;font-size:14px;
    }
    #chatWrap{left:12px;bottom:12px;width:360px;z-index:30}
    #chatBox{height:132px;overflow-y:auto;margin-bottom:8px;padding:10px;font-size:13px;line-height:1.45}
    #chatInput{
      width:100%;border:1px solid var(--border);border-radius:12px;padding:12px;
      outline:none;background:rgba(0,0,0,.45);color:var(--text);font-size:14px;
    }
    #minimapWrap{right:12px;bottom:12px;width:170px;height:170px;padding:10px}
    #minimap{width:150px;height:150px;border-radius:10px;display:block;background:#040608;border:1px solid rgba(255,255,255,.12)}
    #radioBox{right:12px;top:230px;min-width:260px;max-width:320px;padding:10px 12px;font-size:13px}
    #crosshair{
      position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
      width:18px;height:18px;pointer-events:none;z-index:15;
    }
    #crosshair::before,#crosshair::after{
      content:"";position:absolute;background:rgba(255,255,255,.9);box-shadow:0 0 8px rgba(255,255,255,.35);
    }
    #crosshair::before{width:2px;height:18px;left:8px;top:0}
    #crosshair::after{width:18px;height:2px;left:0;top:8px}
    #interactionPrompt{
      position:fixed;left:50%;bottom:86px;transform:translateX(-50%);
      padding:10px 14px;border-radius:12px;background:rgba(8,12,20,.82);
      border:1px solid rgba(255,255,255,.12);color:#fff;z-index:50;display:none;
    }
    #damageFlash{
      position:fixed;inset:0;z-index:18;pointer-events:none;
      background:radial-gradient(circle at center, transparent 48%, rgba(255,0,0,.22) 100%);
      opacity:0;transition:opacity .14s ease;
    }
    #mobileControls{position:fixed;inset:0;pointer-events:none;z-index:40;display:none}
    .mBtn{
      pointer-events:auto;position:absolute;padding:16px;border:none;border-radius:50%;
      background:rgba(20,20,20,.72);color:#fff;font-weight:700;min-width:64px;min-height:64px;
      border:1px solid rgba(255,255,255,.14);
    }
    #joyPad{left:20px;bottom:28px;width:140px;height:140px;position:absolute;pointer-events:auto;border-radius:50%;border:1px solid rgba(255,255,255,.14);background:rgba(20,20,20,.32)}
    #joyKnob{position:absolute;left:50px;top:50px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.25)}
    #fireBtn{right:20px;bottom:34px}
    #interactBtn{right:100px;bottom:120px}
    #reloadBtn{right:32px;bottom:130px}
    #sprintBtn{left:176px;bottom:42px}
    .muted{color:var(--muted)}
    .ok{color:var(--ok)}
    .warn{color:var(--warn)}
    .danger{color:var(--danger)}
    .accent{color:var(--accent)}
    .blue{color:var(--blue)}
    .purple{color:var(--purple)}
    @media (max-width: 900px){
      #help{display:none}
      #mobileControls{display:block}
      #missionBox{min-width:unset;width:calc(100vw - 24px)}
      #chatWrap{width:300px}
    }
  </style>
</head>
<body>
  <div id="boot">
    <div id="bootInner">
      <h1 id="bootTitle">GlowCity</h1>
      <p id="bootSub">AAA GitHub-ready browser build</p>
      <div id="bootBar"><div id="bootFill"></div></div>
      <button id="bootBtn">Enter City</button>
    </div>
  </div>

  <canvas id="game"></canvas>
  <div id="damageFlash"></div>
  <div id="crosshair"></div>
  <div id="interactionPrompt"></div>

  <div id="hud" class="panel"></div>

  <div id="help" class="panel">
    <strong style="color:#fff">Controls</strong><br>
    WASD = move / drive<br>
    Shift = sprint<br>
    Q / E = turn on foot<br>
    Mouse / touch = aim<br>
    Click = shoot<br>
    F = enter / exit / interact<br>
    R = reload / buy ammo in shop<br>
    1-4 = weapon swap<br>
    M = radio
  </div>

  <div id="missionBox" class="panel"></div>

  <div id="chatWrap" class="panel">
    <div id="chatBox"></div>
    <input id="chatInput" placeholder="Local chat..." />
  </div>

  <div id="radioBox" class="panel"></div>

  <div id="minimapWrap" class="panel">
    <canvas id="minimap" width="150" height="150"></canvas>
  </div>

  <div id="mobileControls">
    <div id="joyPad"><div id="joyKnob"></div></div>
    <button id="fireBtn" class="mBtn">FIRE</button>
    <button id="interactBtn" class="mBtn">USE</button>
    <button id="reloadBtn" class="mBtn">R</button>
    <button id="sprintBtn" class="mBtn">RUN</button>
  </div>

  <script>
    window.io = null;
  </script>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const canvas = document.getElementById("game");
    const hud = document.getElementById("hud");
    const missionBox = document.getElementById("missionBox");
    const chatBox = document.getElementById("chatBox");
    const chatInput = document.getElementById("chatInput");
    const radioBox = document.getElementById("radioBox");
    const minimap = document.getElementById("minimap");
    const mini = minimap.getContext("2d");
    const interactionPrompt = document.getElementById("interactionPrompt");
    const damageFlash = document.getElementById("damageFlash");
    const boot = document.getElementById("boot");
    const bootFill = document.getElementById("bootFill");
    const bootBtn = document.getElementById("bootBtn");

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: "high-performance" });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.autoUpdate = false;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.18;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0f18);
    scene.fog = new THREE.FogExp2(0x0a0f18, 0.0022);

    const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 3000);
    camera.rotation.order = "YXZ";
    camera.position.set(0, 6, 12);
    camera.lookAt(0, 1, 0);

    const loader = new GLTFLoader();
    const clock = new THREE.Clock();

    const worldGroup = new THREE.Group();
    const actorGroup = new THREE.Group();
    const fxGroup = new THREE.Group();
    scene.add(worldGroup, actorGroup, fxGroup);

    const hemi = new THREE.HemisphereLight(0xd8e6ff, 0x10151d, 0.9);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 2.4);
    sun.position.set(120, 160, 90);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    scene.add(sun);

    const bounce = new THREE.PointLight(0x33bbff, 9, 120);
    bounce.position.set(0, 10, 0);
    scene.add(bounce);

    const state = {
      mode: "BOOT",
      x: 0,
      z: 12,
      rot: 0,
      camX: 0,
      camZ: 12,
      camY: 6,
      velX: 0,
      velZ: 0,
      driveSpeed: 0,
      health: Number(localStorage.getItem("bc_health") || 100),
      armor: Number(localStorage.getItem("bc_armor") || 50),
      stamina: 100,
      stress: 0,
      money: Number(localStorage.getItem("bc_money") || 300),
      ammo: Number(localStorage.getItem("bc_ammo") || 12),
      reserveAmmo: Number(localStorage.getItem("bc_reserveAmmo") || 120),
      wanted: Number(localStorage.getItem("bc_wanted") || 0),
      level: Number(localStorage.getItem("bc_level") || 1),
      xp: Number(localStorage.getItem("bc_xp") || 0),
      weapon: localStorage.getItem("bc_weapon") || "pistol",
      inCar: false,
      insideInterior: false,
      interiorType: null,
      currentDistrict: "Booklyn",
      playerGang: "Sons of Gunsmoke",
      missionState: localStorage.getItem("bc_missionState") || "pickup",
      missionText: "Go to pickup marker",
      modeLabel: "On Foot",
      lastShotAt: 0,
      lastDamageAt: 0,
      wantedDecayAt: 0,
      reloading: false,
      mouseLook: false,
      isShooting: false,
      keys: {},
      onlinePlayers: 1,
      traffic: [],
      policeCars: [],
      civilians: [],
      enemies: [],
      radioName: "OFF",
      fps: 60,
      lastSave: performance.now(),
      joy: { x: 0, y: 0 }
    };

    const refs = {
      player: null,
      playerMount: null,
      playerCar: null,
      playerWeapon: null,
      pickupMarker: null,
      deliveryMarker: null,
      shopMarker: null,
      garageMarker: null,
      interiorAnchors: [],
      activeInterior: null,
      policeStation: null,
      counterPoint: null,
      bedPoint: null,
      policeDeskPoint: null,
      warehousePoint: null,
      worldTemplates: {
        player: null,
        gun: null,
        playerCar: null,
        city: null,
        buildingA: null,
        buildingB: null,
        policeStation: null
      },
      worldBuildings: []
    };

    function addChat(msg) {
      const div = document.createElement("div");
      div.textContent = msg;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function flashDamage() {
      damageFlash.style.opacity = "1";
      setTimeout(() => damageFlash.style.opacity = "0", 120);
    }

    function stdMat(color, rough = 0.65, metal = 0.2) {
      return new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: metal });
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function dist2D(ax, az, bx, bz) {
      return Math.hypot(ax - bx, az - bz);
    }

    function districtFromPosition(x, z) {
      if (x < -90 && z > 90) return "Booklyn";
      if (x > 90 && z > 90) return "Manhatten";
      if (x < -90 && z < -90) return "Bronks";
      if (x > 90 && z < -90) return "Queenz";
      return "Harlem Heights";
    }

    function safeLoad(url, timeout = 2500) {
      return new Promise((resolve) => {
        let done = false;
        const timer = setTimeout(() => {
          if (done) return;
          done = true;
          resolve(null);
        }, timeout);

        loader.load(
          url,
          (gltf) => {
            if (done) return;
            done = true;
            clearTimeout(timer);
            resolve(gltf.scene);
          },
          undefined,
          () => {
            if (done) return;
            done = true;
            clearTimeout(timer);
            resolve(null);
          }
        );
      });
    }

    function optimizeModel(model) {
      model.traverse((o) => {
        if (o.isMesh) {
          o.castShadow = true;
          o.receiveShadow = true;
          o.frustumCulled = true;
          if (o.material) {
            o.material = o.material.clone();
            o.material.envMapIntensity = 1.2;
          }
        }
      });
      return model;
    }

    function setGroundY(model, targetY = 0) {
      const box = new THREE.Box3().setFromObject(model);
      model.position.y += targetY - box.min.y;
      return model;
    }

    function tintModel(model, amount = 0.05) {
      model.traverse((o) => {
        if (o.isMesh && o.material?.color) {
          o.material.color.offsetHSL(rand(-0.03, 0.03), rand(-0.02, 0.02), rand(-amount, amount));
        }
      });
      return model;
    }

    function proceduralPlayer(color = 0xffffff) {
      const g = new THREE.Group();
      const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.45, 1.2, 8, 16), stdMat(0x12151c, 0.55, 0.2));
      body.position.y = 1.15;
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.35, 24, 24), stdMat(0xc68642, 0.92, 0.02));
      head.position.y = 2.15;
      const chest = new THREE.Mesh(new THREE.BoxGeometry(1, 1.35, 0.58), stdMat(color, 0.6, 0.12));
      chest.position.y = 1.15;
      g.add(body, head, chest);
      return g;
    }

    function proceduralCar(color = 0xff3030) {
      const g = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(3.4, 1, 5.6), stdMat(color, 0.22, 0.88));
      body.position.y = 1;
      const roof = new THREE.Mesh(new THREE.BoxGeometry(2, 0.75, 2.4), stdMat(0x111111, 0.3, 0.45));
      roof.position.set(0, 1.68, -0.05);
      g.add(body, roof);
      return g;
    }

    function weaponStats() {
      return {
        pistol: { damage: 28, fireRate: 220, mag: 12, reload: 1100, recoil: 0.02 },
        smg: { damage: 18, fireRate: 95, mag: 30, reload: 1400, recoil: 0.012 },
        shotgun: { damage: 55, fireRate: 780, mag: 8, reload: 1800, recoil: 0.05 },
        rifle: { damage: 34, fireRate: 120, mag: 30, reload: 1500, recoil: 0.02 }
      }[state.weapon];
    }

    function makeWeaponMesh(type) {
      const g = new THREE.Group();
      if (type === "pistol") {
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.16, 0.7), stdMat(0x181818, 0.35, 0.6));
        const grip = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.28, 0.14), stdMat(0x111111, 0.35, 0.6));
        grip.position.set(0, -0.2, 0.12);
        g.add(body, grip);
      } else if (type === "smg") {
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.18, 1.0), stdMat(0x1e1e1e, 0.35, 0.6));
        const mag = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.3, 0.14), stdMat(0x111111, 0.35, 0.6));
        mag.position.set(0, -0.22, 0.1);
        g.add(body, mag);
      } else if (type === "shotgun") {
        const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 1.4), stdMat(0x1d1d1d, 0.35, 0.6));
        const stock = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.16, 0.5), stdMat(0x4a2f1f, 0.75, 0.1));
        stock.position.set(0, -0.02, -0.9);
        g.add(barrel, stock);
      } else {
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.18, 1.4), stdMat(0x191919, 0.35, 0.6));
        const mag = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.3, 0.18), stdMat(0x111111, 0.35, 0.6));
        const scope = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.08, 0.28), stdMat(0x202020, 0.35, 0.6));
        mag.position.set(0, -0.22, 0.05);
        scope.position.set(0, 0.12, 0.05);
        g.add(body, mag, scope);
      }
      return g;
    }

    function createMarker(color = 0x00d7ff, radius = 2.5) {
      const mesh = new THREE.Mesh(
        new THREE.CylinderGeometry(radius, radius, 0.16, 24),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.65 })
      );
      mesh.rotation.x = -Math.PI / 2;
      return mesh;
    }

    async function loadTemplates() {
      refs.worldTemplates.player = await safeLoad("./models/player.glb");
      refs.worldTemplates.gun = await safeLoad("./models/gun.glb");
      refs.worldTemplates.playerCar = await safeLoad("./models/model.glb");
      refs.worldTemplates.city = await safeLoad("./models/city.glb");
      refs.worldTemplates.buildingA = await safeLoad("./models/buildings.glb");
      refs.worldTemplates.buildingB = await safeLoad("./models/ccity_building_set_1.glb");
      refs.worldTemplates.policeStation = await safeLoad("./models/southern_district_police_station.glb");
      await new Promise(r => setTimeout(r, 200));
    }

    function buildGroundShell() {
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(1800, 1800),
        new THREE.MeshStandardMaterial({ color: 0x0d141b, roughness: 0.98, metalness: 0.02 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      worldGroup.add(ground);

      for (let i = -480; i <= 480; i += 60) {
        const vRoad = new THREE.Mesh(
          new THREE.PlaneGeometry(24, 1100),
          new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1, metalness: 0.02 })
        );
        vRoad.rotation.x = -Math.PI / 2;
        vRoad.position.set(i, 0.02, 0);
        worldGroup.add(vRoad);

        const hRoad = new THREE.Mesh(
          new THREE.PlaneGeometry(1100, 24),
          new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1, metalness: 0.02 })
        );
        hRoad.rotation.x = -Math.PI / 2;
        hRoad.position.set(0, 0.02, i);
        worldGroup.add(hRoad);

        const laneV = new THREE.Mesh(
          new THREE.PlaneGeometry(1, 1100),
          new THREE.MeshBasicMaterial({ color: 0xf2d14c, transparent: true, opacity: 0.7 })
        );
        laneV.rotation.x = -Math.PI / 2;
        laneV.position.set(i, 0.03, 0);
        worldGroup.add(laneV);

        const laneH = new THREE.Mesh(
          new THREE.PlaneGeometry(1100, 1),
          new THREE.MeshBasicMaterial({ color: 0xf2d14c, transparent: true, opacity: 0.7 })
        );
        laneH.rotation.x = -Math.PI / 2;
        laneH.position.set(0, 0.03, i);
        worldGroup.add(laneH);
      }

      for (let i = -8; i <= 8; i++) {
        const positions = [[i * 60, 20], [i * 60, -20], [20, i * 60], [-20, i * 60]];
        for (const [x, z] of positions) {
          const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 8, 10), stdMat(0x434a55, 0.82, 0.08));
          pole.position.set(x, 4, z);
          pole.castShadow = true;
          worldGroup.add(pole);
          const lamp = new THREE.PointLight(0xffcc88, 10, 40);
          lamp.position.set(x, 8, z);
          worldGroup.add(lamp);
        }
      }
    }

    function addWorldBuilding(mesh) {
      worldGroup.add(mesh);
      refs.worldBuildings.push(mesh);
    }

    function buildGLBEnvironment() {
      if (refs.worldTemplates.city) {
        const city = optimizeModel(refs.worldTemplates.city.clone());
        city.scale.setScalar(2);
        setGroundY(city, 0);
        addWorldBuilding(city);
      }

      const packs = [refs.worldTemplates.buildingA, refs.worldTemplates.buildingB].filter(Boolean);
      if (packs.length) {
        const MAX_BUILDINGS = 28;
        for (let i = 0; i < MAX_BUILDINGS; i++) {
          const base = pick(packs);
          const clone = optimizeModel(base.clone());
          const x = rand(-420, 420);
          const z = rand(-420, 420);
          if (Math.abs(x) < 42 || Math.abs(z) < 42) continue;
          const scale = 0.8 + Math.random() * 1.4;
          clone.scale.setScalar(scale);
          clone.rotation.y = Math.floor(Math.random() * 4) * (Math.PI / 2);
          tintModel(clone, 0.06);
          setGroundY(clone, 0);
          clone.position.x += x;
          clone.position.z += z;
          addWorldBuilding(clone);
        }
      }

      if (!refs.worldBuildings.length) {
        for (let i = 0; i < 34; i++) {
          const h = rand(20, 90);
          const b = new THREE.Mesh(new THREE.BoxGeometry(18, h, 18), stdMat(0x1e232d, 0.7, 0.22));
          const x = rand(-420, 420);
          const z = rand(-420, 420);
          if (Math.abs(x) < 42 || Math.abs(z) < 42) continue;
          b.position.set(x, h / 2, z);
          b.castShadow = true;
          b.receiveShadow = true;
          addWorldBuilding(b);
        }
      }
    }

    function buildPoliceStation() {
      if (refs.worldTemplates.policeStation) {
        refs.policeStation = optimizeModel(refs.worldTemplates.policeStation.clone());
        refs.policeStation.scale.setScalar(2);
        setGroundY(refs.policeStation, 0);
        refs.policeStation.position.set(80, refs.policeStation.position.y, 80);
        worldGroup.add(refs.policeStation);
      } else {
        const fallback = new THREE.Mesh(new THREE.BoxGeometry(22, 12, 16), stdMat(0x2a3340, 0.82, 0.06));
        fallback.position.set(80, 6, 80);
        fallback.castShadow = true;
        fallback.receiveShadow = true;
        refs.policeStation = fallback;
        worldGroup.add(fallback);
      }

      const anchor = createMarker(0x58a8ff, 3);
      anchor.position.set(80, 0.18, 92);
      scene.add(anchor);
      refs.interiorAnchors.push({ type: "police", marker: anchor, x: 80, z: 92 });
    }

    function buildMissionMarkers() {

    function buildPlayer() {
      refs.player = refs.worldTemplates.player ? optimizeModel(refs.worldTemplates.player.clone()) : proceduralPlayer(0x0f1d2b);
      refs.player.scale.setScalar(1.2);
      setGroundY(refs.player, 0);
      refs.player.position.set(state.x, refs.player.position.y, state.z);

      refs.playerMount = new THREE.Group();
      refs.playerMount.position.set(0.3, 1.1, 0.25);
      refs.player.add(refs.playerMount);

      state.camX = state.x;
      state.camZ = state.z;
    }

    function updateWeapon() {
      if (!refs.playerMount) return;
      while (refs.playerMount.children.length) refs.playerMount.remove(refs.playerMount.children[0]);
      refs.playerWeapon = refs.worldTemplates.gun ? optimizeModel(refs.worldTemplates.gun.clone()) : makeWeaponMesh(state.weapon);
      refs.playerWeapon.rotation.y = Math.PI / 2;
      refs.playerMount.add(refs.playerWeapon);
    }

    function buildCar() {
      refs.playerCar = refs.worldTemplates.playerCar ? optimizeModel(refs.worldTemplates.playerCar.clone()) : proceduralCar();
      refs.playerCar.scale.setScalar(1.5);
      setGroundY(refs.playerCar, 0);
      refs.playerCar.position.set(16, refs.playerCar.position.y, 16);
      actorGroup.add(refs.playerCar);
    }

    function spawnTraffic() {
      const civTemplates = [];
      if (refs.worldTemplates.playerCar) civTemplates.push(refs.worldTemplates.playerCar);
      if (!civTemplates.length) civTemplates.push(proceduralCar(0x00aaff));

      for (let i = 0; i < 8; i++) {
        const base = pick(civTemplates);
        const mesh = base.clone ? optimizeModel(base.clone()) : proceduralCar(0x00aaff);
        mesh.scale.setScalar(0.65);
        setGroundY(mesh, 0);
        mesh.position.set(rand(-260, 260), mesh.position.y, rand(-260, 260));
        actorGroup.add(mesh);
        state.traffic.push({ mesh, dir: rand(0, Math.PI * 2), speed: rand(0.05, 0.09) });
      }

      for (let i = 0; i < 3; i++) {
        const base = refs.worldTemplates.playerCar || proceduralCar(0x2244ff);
        const mesh = base.clone ? optimizeModel(base.clone()) : proceduralCar(0x2244ff);
        mesh.scale.setScalar(0.68);
        setGroundY(mesh, 0);
        mesh.position.set(rand(-220, 220), mesh.position.y, rand(-220, 220));
        actorGroup.add(mesh);
        state.policeCars.push({ mesh, dir: rand(0, Math.PI * 2), speed: rand(0.06, 0.1) });
      }
    }

    function makeHuman(role = "civilian") {
      const color = role === "enemy" ? 0x4d1010 : role === "worker" ? 0x27323d : 0x1d2530;
      const mesh = proceduralPlayer(color);
      mesh.scale.setScalar(role === "enemy" ? 1 : 0.95);
      return {
        mesh,
        role,
        hp: role === "enemy" ? 100 : 100,
        speed: role === "enemy" ? rand(0.025, 0.036) : rand(0.015, 0.03),
        state: "idle",
        dir: rand(0, Math.PI * 2),
        timer: rand(1, 4),
        baseY: 0
      };
    }

    function spawnPeople() {
      for (let i = 0; i < 18; i++) {
        const npc = makeHuman(i < 12 ? "civilian" : "worker");
        npc.mesh.position.set(rand(-220, 220), 0, rand(-220, 220));
        npc.baseY = npc.mesh.position.y;
        actorGroup.add(npc.mesh);
        state.civilians.push(npc);
      }

      for (let i = 0; i < 12; i++) {
        const enemy = makeHuman("enemy");
        enemy.mesh.position.set(rand(-140, 140), 0, rand(-140, 140));
        enemy.baseY = enemy.mesh.position.y;
        actorGroup.add(enemy.mesh);
        state.enemies.push(enemy);
      }
    }

    function buildInterior(type) {
      const g = new THREE.Group();
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(type === "warehouse" ? 70 : type === "police" ? 56 : 44, type === "warehouse" ? 50 : type === "police" ? 42 : 34),
        stdMat(type === "police" ? 0x1d2530 : 0x24272d, 0.95, 0.02)
      );
      floor.rotation.x = -Math.PI / 2;
      g.add(floor);

      const size = type === "warehouse" ? [70, 50, 12] : type === "police" ? [56, 42, 10] : type === "safehouse" ? [34, 26, 9] : [44, 34, 10];
      const [w, d, h] = size;
      const wallMat = stdMat(type === "police" ? 0x324152 : 0x2b2f35, 0.9, 0.04);

      const walls = [
        new THREE.Mesh(new THREE.BoxGeometry(w, h, 2), wallMat),
        new THREE.Mesh(new THREE.BoxGeometry(w, h, 2), wallMat),
        new THREE.Mesh(new THREE.BoxGeometry(2, h, d), wallMat),
        new THREE.Mesh(new THREE.BoxGeometry(2, h, d), wallMat)
      ];
      walls[0].position.set(0, h / 2, -d / 2);
      walls[1].position.set(0, h / 2, d / 2);
      walls[2].position.set(-w / 2, h / 2, 0);
      walls[3].position.set(w / 2, h / 2, 0);
      walls.forEach(wm => { wm.castShadow = true; wm.receiveShadow = true; g.add(wm); });

      const light = new THREE.PointLight(type === "police" ? 0xaec8ff : 0xffcc88, 16, 70);
      light.position.set(0, h - 2, 0);
      g.add(light);

      const exit = createMarker(0x00d7ff, 2.2);
      exit.position.set(0, 0.18, d / 2 - 5);
      g.add(exit);

      let counterPoint = null;
      let bedPoint = null;
      let policeDeskPoint = null;
      let warehousePoint = null;

      if (type === "shop") {
        const counter = new THREE.Mesh(new THREE.BoxGeometry(12, 2, 3), stdMat(0x5a4637, 0.85, 0.08));
        counter.position.set(10, 1, 0);
        g.add(counter);
        counterPoint = new THREE.Vector3(10, 0, 0);
      }

      if (type === "safehouse") {
        const bed = new THREE.Mesh(new THREE.BoxGeometry(8, 1.4, 4), stdMat(0x4e5568, 0.86, 0.04));
        bed.position.set(-6, 0.7, -4);
        g.add(bed);
        bedPoint = new THREE.Vector3(-6, 0, -4);
      }

      if (type === "police") {
        const desk = new THREE.Mesh(new THREE.BoxGeometry(10, 2, 3), stdMat(0x3c4654, 0.88, 0.04));
        desk.position.set(0, 1, -6);
        g.add(desk);
        policeDeskPoint = new THREE.Vector3(0, 0, -6);
      }

      if (type === "warehouse") {
        for (let i = -2; i <= 2; i++) {
          const crate = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 6), stdMat(0x6a5435, 0.9, 0.02));
          crate.position.set(i * 10, 3, rand(-8, 8));
          g.add(crate);
        }
        warehousePoint = new THREE.Vector3(0, 0, -8);
      }

      g.userData = {
        type,
        exit,
        spawn: { x: 0, z: d / 2 - 9 },
        counterPoint,
        bedPoint,
        policeDeskPoint,
        warehousePoint
      };

      return g;
    }

    function enterInterior(type) {
      if (refs.activeInterior?.parent) refs.activeInterior.parent.remove(refs.activeInterior);
      refs.activeInterior = buildInterior(type);
      actorGroup.add(refs.activeInterior);
      state.insideInterior = true;
      state.interiorType = type;
      state.inCar = false;
      state.x = refs.activeInterior.userData.spawn.x;
      state.z = refs.activeInterior.userData.spawn.z;
      state.modeLabel = `Interior: ${type}`;
    }

    function exitInterior() {
      refs.activeInterior?.parent?.remove(refs.activeInterior);
      refs.activeInterior = null;
      state.insideInterior = false;
      state.interiorType = null;
      state.x = 0;
      state.z = 12;
      state.modeLabel = "On Foot";
    }

    function interact() {
      if (state.insideInterior && refs.activeInterior) {
        const ui = refs.activeInterior.userData;

        if (dist2D(state.x, state.z, ui.exit.position.x, ui.exit.position.z) < 6) {
          exitInterior();
          return;
        }

        if (ui.counterPoint && dist2D(state.x, state.z, ui.counterPoint.x, ui.counterPoint.z) < 6) {
          if (state.money >= 50) {
            state.money -= 50;
            state.reserveAmmo += 20;
            addChat("Bought reserve ammo +20");
          } else {
            addChat("Not enough money.");
          }
          return;
        }

        if (ui.bedPoint && dist2D(state.x, state.z, ui.bedPoint.x, ui.bedPoint.z) < 6) {
          state.health = 100;
          state.armor = 50;
          addChat("Safehouse restored health and armor.");
          return;
        }

        if (ui.policeDeskPoint && dist2D(state.x, state.z, ui.policeDeskPoint.x, ui.policeDeskPoint.z) < 6) {
          state.wanted = 0;
          addChat("Police station calmed the heat.");
          return;
        }

        if (ui.warehousePoint && dist2D(state.x, state.z, ui.warehousePoint.x, ui.warehousePoint.z) < 6) {
          state.money += 150;
          state.xp += 20;
          addChat("Warehouse objective complete. +$150");
          return;
        }
      }

      if (!state.insideInterior && refs.playerCar) {
        const dCar = dist2D(state.x, state.z, refs.playerCar.position.x, refs.playerCar.position.z);
        if (dCar < 8) {
          state.inCar = !state.inCar;
          state.modeLabel = state.inCar ? "Driving" : "On Foot";
          return;
        }
      }

      if (state.missionState === "pickup") {
        if (refs.pickupMarker && dist2D(state.x, state.z, refs.pickupMarker.position.x, refs.pickupMarker.position.z) < 7) {
          state.missionState = "deliver";
          state.missionText = "Deliver the package";
          addChat("Package picked up.");
          return;
        }
      } else {
        if (refs.deliveryMarker && dist2D(state.x, state.z, refs.deliveryMarker.position.x, refs.deliveryMarker.position.z) < 7) {
          state.missionState = "pickup";
          state.money += 250;
          state.level += 1;
          state.xp += 40;
          state.missionText = "Go to pickup marker";
          addChat("Delivery complete. +$250");
          return;
        }
      }

      if (!state.insideInterior) {
        for (const a of refs.interiorAnchors) {
          if (dist2D(state.x, state.z, a.x, a.z) < 8) {
            enterInterior(a.type);
            return;
          }
        }
      }
    }

    function reloadWeapon() {
      if (state.reloading) return;
      if (state.insideInterior && state.interiorType === "shop") {
        if (state.money >= 50) {
          state.money -= 50;
          state.reserveAmmo += 20;
          addChat("Bought reserve ammo +20");
        } else {
          addChat("Not enough money.");
        }
        return;
      }

      const ws = weaponStats();
      if (state.ammo >= ws.mag || state.reserveAmmo <= 0) return;

      state.reloading = true;
      addChat("Reloading...");
      setTimeout(() => {
        const need = ws.mag - state.ammo;
        const load = Math.min(need, state.reserveAmmo);
        state.ammo += load;
        state.reserveAmmo -= load;
        state.reloading = false;
      }, ws.reload);
    }

    function findHitEnemy(hit) {
      return state.enemies.find(e => {
        let found = false;
        e.mesh.traverse(o => { if (o === hit) found = true; });
        return found;
      });
    }

    function shoot() {
      if (state.mode !== "PLAYING") return;
      if (state.reloading || (state.insideInterior && state.interiorType === "shop")) return;

      const ws = weaponStats();
      const now = performance.now();
      if (state.ammo <= 0) return;
      if (now - state.lastShotAt < ws.fireRate) return;

      state.lastShotAt = now;
      state.ammo -= 1;
      state.isShooting = true;
      setTimeout(() => state.isShooting = false, 60);

      bounce.intensity = 18;
      setTimeout(() => bounce.intensity = 9, 60);

      const origin = new THREE.Vector3(state.x, 1.5, state.z);
      const dir = new THREE.Vector3(Math.sin(state.rot), 0, Math.cos(state.rot)).normalize();
      const ray = new THREE.Raycaster(origin, dir, 0, 20);
      const hits = ray.intersectObjects(state.enemies.map(e => e.mesh), true);

      if (hits.length) {
        const enemy = findHitEnemy(hits[0].object);
        if (enemy) {
          enemy.hp -= ws.damage;
          enemy.mesh.position.x -= Math.sin(state.rot) * 0.8;
          enemy.mesh.position.z -= Math.cos(state.rot) * 0.8;
          flashDamage();
          if (enemy.hp <= 0) {
            enemy.mesh.parent?.remove(enemy.mesh);
            state.enemies = state.enemies.filter(e => e !== enemy);
            state.money += 100;
            state.xp += 20;
            addChat("Enemy down. +$100");
          }
        }
      }

      state.wanted = Math.min(5, state.wanted + 1);
      state.wantedDecayAt = now + 5000;
      camera.rotation.x -= ws.recoil;
      camera.position.y += (Math.random() - 0.5) * 0.1;
    }

    function setupInput() {
      document.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        state.keys[k] = true;
        if (k === "r") reloadWeapon();
        if (k === "f") interact();
        if (["1", "2", "3", "4"].includes(e.key)) {
          state.weapon = { "1": "pistol", "2": "smg", "3": "shotgun", "4": "rifle" }[e.key];
          updateWeapon();
        }
        if (k === "m") cycleRadio();
      });

      document.addEventListener("keyup", (e) => {
        state.keys[e.key.toLowerCase()] = false;
      });

      document.body.addEventListener("click", () => {
        state.mode = "PLAYING";
        state.mouseLook = true;
      });

      document.addEventListener("click", () => {
        shoot();
      });

      document.addEventListener("mousemove", (e) => {
        if (!state.mouseLook || state.mode !== "PLAYING") return;
        state.rot -= e.movementX * 0.002;
      });

      chatInput.addEventListener("keydown", (e) => {
        if (e.key !== "Enter") return;
        const value = chatInput.value.trim();
        if (!value) return;
        addChat("You: " + value);
        chatInput.value = "";
      });

      const fireBtn = document.getElementById("fireBtn");
      const interactBtn = document.getElementById("interactBtn");
      const reloadBtn = document.getElementById("reloadBtn");
      const sprintBtn = document.getElementById("sprintBtn");
      const joyPad = document.getElementById("joyPad");
      const joyKnob = document.getElementById("joyKnob");

      let joyActive = false;

      fireBtn.ontouchstart = (e) => { e.preventDefault(); shoot(); };
      interactBtn.ontouchstart = (e) => { e.preventDefault(); interact(); };
      reloadBtn.ontouchstart = (e) => { e.preventDefault(); reloadWeapon(); };
      sprintBtn.ontouchstart = (e) => { e.preventDefault(); state.keys["shift"] = true; };
      sprintBtn.ontouchend = (e) => { e.preventDefault(); state.keys["shift"] = false; };

      joyPad.ontouchstart = (e) => { e.preventDefault(); joyActive = true; };
      joyPad.ontouchmove = (e) => {
        e.preventDefault();
        if (!joyActive) return;
        const rect = joyPad.getBoundingClientRect();
        const t = e.touches[0];
        const x = t.clientX - rect.left - rect.width / 2;
        const y = t.clientY - rect.top - rect.height / 2;
        const clampedX = Math.max(-40, Math.min(40, x));
        const clampedY = Math.max(-40, Math.min(40, y));
        joyKnob.style.transform = `translate(${clampedX}px, ${clampedY}px)`;
        state.joy.x = clampedX / 40;
        state.joy.y = clampedY / 40;
      };
      joyPad.ontouchend = () => {
        joyActive = false;
        joyKnob.style.transform = "translate(0px,0px)";
        state.joy.x = 0;
        state.joy.y = 0;
      };
    }

    const stations = [
      { name: "OFF", url: null },
      { name: "HOT 97", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/WQHTFM.mp3" },
      { name: "POWER 105.1", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/WWPRFM.mp3" },
      { name: "Z100 NY", url: "https://stream.revma.ihrhls.com/zc1467" }
    ];
    let stationIndex = 0;
    let radioAudio = new Audio();
    radioAudio.preload = "none";
    radioAudio.volume = 0.35;

    function cycleRadio() {
      stationIndex = (stationIndex + 1) % stations.length;
      const station = stations[stationIndex];
      state.radioName = station.name;
      radioAudio.pause();
      if (station.url) {
        radioAudio = new Audio(station.url);
        radioAudio.preload = "none";
        radioAudio.volume = 0.35;
        radioAudio.play().catch(() => {});
      }
    }

    function updatePlayer(delta) {
      if (!refs.player || state.inCar || (state.insideInterior && state.interiorType === "shop" && state.reloading)) return;

      if (state.keys["shift"] || Math.abs(state.joy.y) > 0.7) state.stamina -= 0.4;
      else state.stamina += 0.25;
      state.stamina = Math.max(0, Math.min(100, state.stamina));

      const accel = (state.keys["shift"] ? 0.025 : 0.018) * (state.stamina < 20 ? 0.5 : 1);
      const friction = 0.88;

      let inputX = 0, inputZ = 0;
      if (state.keys["w"] || state.joy.y < -0.15) inputZ += 1;
      if (state.keys["s"] || state.joy.y > 0.15) inputZ -= 1;
      if (state.keys["a"] || state.joy.x < -0.15) inputX += 1;
      if (state.keys["d"] || state.joy.x > 0.15) inputX -= 1;

      if (state.keys["q"]) state.rot += 0.04;
      if (state.keys["e"]) state.rot -= 0.04;

      const sin = Math.sin(state.rot);
      const cos = Math.cos(state.rot);

      state.velX += (sin * inputZ + cos * inputX) * accel;
      state.velZ += (cos * inputZ - sin * inputX) * accel;

      state.velX *= friction;
      state.velZ *= friction;

      state.x += state.velX * 6;
      state.z += state.velZ * 6;

      const speed = Math.hypot(state.velX, state.velZ);
      state.modeLabel = "On Foot";
      refs.player.position.set(state.x, Math.sin(performance.now() * 0.008) * (speed < 0.02 ? 0.02 : 0.07), state.z);
      refs.player.rotation.y = state.rot + Math.PI;
      refs.player.rotation.x = -speed * 3;
    }

    function updateVehicle() {
      if (!state.inCar || !refs.playerCar) return;

      const accel = 0.05;
      const grip = 0.96;

      if (state.keys["w"] || state.joy.y < -0.15) state.driveSpeed += accel;
      if (state.keys["s"] || state.joy.y > 0.15) state.driveSpeed -= accel * 0.6;
      state.driveSpeed *= grip;

      const turnFactor = Math.min(Math.abs(state.driveSpeed) * 2, 1);
      if (state.keys["a"] || state.joy.x < -0.15) state.rot += 0.035 * turnFactor;
      if (state.keys["d"] || state.joy.x > 0.15) state.rot -= 0.035 * turnFactor;

      state.x += Math.sin(state.rot) * state.driveSpeed * 10;
      state.z += Math.cos(state.rot) * state.driveSpeed * 10;

      refs.playerCar.position.x = state.x;
      refs.playerCar.position.z = state.z;
      refs.playerCar.rotation.y = state.rot;
      state.modeLabel = "Driving";
    }

    function updateTrafficAndPolice() {
      const maxDist = 300;

      for (const t of state.traffic) {
        t.mesh.position.x += Math.sin(t.dir) * t.speed;
        t.mesh.position.z += Math.cos(t.dir) * t.speed;
        if (Math.random() < 0.01) t.dir += rand(-0.4, 0.4);

        if (t.mesh.position.x > 320) t.mesh.position.x = -320;
        if (t.mesh.position.x < -320) t.mesh.position.x = 320;
        if (t.mesh.position.z > 320) t.mesh.position.z = -320;
        if (t.mesh.position.z < -320) t.mesh.position.z = 320;

        t.mesh.visible = dist2D(state.x, state.z, t.mesh.position.x, t.mesh.position.z) < maxDist;
      }

      for (const p of state.policeCars) {
        const dx = state.x - p.mesh.position.x;
        const dz = state.z - p.mesh.position.z;
        const d = Math.max(1, Math.hypot(dx, dz));

        if (state.wanted > 0) {
          p.mesh.position.x += (dx / d) * p.speed * 1.2;
          p.mesh.position.z += (dz / d) * p.speed * 1.2;
          p.mesh.lookAt(state.x, p.mesh.position.y, state.z);
        }

        p.mesh.visible = d < 360;
      }
    }

    function updateCivilians(delta) {
      for (const c of state.civilians) {
        c.timer -= delta;
        if (c.timer <= 0) {
          c.state = pick(["idle", "walk", "look", "talk", "cross"]);
          c.timer = rand(1.2, 4.6);
          c.dir += rand(-1.2, 1.2);
        }

        const dPlayer = dist2D(state.x, state.z, c.mesh.position.x, c.mesh.position.z);
        if (state.wanted > 1 && dPlayer < 28) c.state = "run";

        if (c.state === "walk" || c.state === "cross" || c.state === "run") {
          const mult = c.state === "run" ? 4 : c.state === "cross" ? 3 : 2;
          if (c.state === "run") {
            const dx = c.mesh.position.x - state.x;
            const dz = c.mesh.position.z - state.z;
            const d = Math.max(0.001, Math.hypot(dx, dz));
            c.mesh.position.x += (dx / d) * c.speed * mult;
            c.mesh.position.z += (dz / d) * c.speed * mult;
            c.mesh.lookAt(c.mesh.position.x + dx, c.mesh.position.y + 1, c.mesh.position.z + dz);
          } else {
            c.mesh.position.x += Math.sin(c.dir) * c.speed * mult;
            c.mesh.position.z += Math.cos(c.dir) * c.speed * mult;
            c.mesh.lookAt(c.mesh.position.x + Math.sin(c.dir), c.mesh.position.y + 1, c.mesh.position.z + Math.cos(c.dir));
          }
        }

        c.mesh.position.y = c.baseY + Math.sin(performance.now() * 0.008) * (c.state === "idle" ? 0.01 : 0.03);
        c.mesh.visible = dPlayer < 260;
      }
    }

    function updateEnemies(now) {
      for (const e of state.enemies) {
        const dx = state.x - e.mesh.position.x;
        const dz = state.z - e.mesh.position.z;
        const dist = Math.hypot(dx, dz) || 1;

        if (dist < 55) {
          if (dist > 2) {
            e.mesh.position.x += (dx / dist) * e.speed;
            e.mesh.position.z += (dz / dist) * e.speed;
            e.mesh.lookAt(state.x, e.mesh.position.y + 1, state.z);
          } else if (now - state.lastDamageAt > 420) {
            let damage = 5;
            if (state.armor > 0) {
              state.armor = Math.max(0, state.armor - 3);
              damage = 2;
            }
            state.health -= damage;
            state.lastDamageAt = now;
            flashDamage();
          }
        } else {
          e.mesh.position.x += Math.sin(now * 0.001 + e.mesh.id) * 0.01;
          e.mesh.position.z += Math.cos(now * 0.001 + e.mesh.id) * 0.01;
        }

        e.mesh.visible = dist < 300;
      }

      while (state.enemies.length < 12) {
        const enemy = makeHuman("enemy");
        enemy.mesh.position.set(rand(-140, 140), 0, rand(-140, 140));
        enemy.baseY = enemy.mesh.position.y;
        actorGroup.add(enemy.mesh);
        state.enemies.push(enemy);
      }
    }

    function updateWorld(delta, now) {
      state.currentDistrict = districtFromPosition(state.x, state.z);
      state.playerGang = "Sons of Gunsmoke";

      if (state.wanted > 0 && now > state.wantedDecayAt) {
        state.wanted = Math.max(0, state.wanted - 1);
        state.wantedDecayAt = now + 5000;
      }

      state.stress = Math.min(100, state.stress * 0.98 + (state.wanted > 0 ? 0.3 : 0));
      bounce.position.set(state.x, 8, state.z);
      state.missionText = state.missionState === "pickup" ? "Go to pickup marker" : "Deliver the package";

      if (state.health <= 0) {
        state.health = 100;
        state.armor = 50;
        state.x = 0;
        state.z = 12;
        state.inCar = false;
        state.modeLabel = "On Foot";
        state.money = Math.max(0, state.money - 200);
      }

      const t = (Math.sin((now * 0.00003)) + 1) * 0.5;
      sun.intensity = 0.2 + t * 2.2;
      scene.fog.density = 0.002 + (1 - t) * 0.0018;

      for (const b of refs.worldBuildings) {
        const d = dist2D(state.x, state.z, b.position.x, b.position.z);
        b.visible = d < 520;
      }
    }

    function updateCamera() {
      state.camX += (state.x - state.camX) * 0.1;
      state.camZ += (state.z - state.camZ) * 0.1;
      const wantedHeight = state.inCar ? 7.2 : 6.2;
      state.camY += (wantedHeight - state.camY) * 0.08;

      const followDist = state.inCar ? 14 : 11;
      camera.position.x = state.camX - Math.sin(state.rot) * followDist;
      camera.position.z = state.camZ - Math.cos(state.rot) * followDist;
      camera.position.y = state.camY + Math.sin(performance.now() * 0.002) * 0.08;
      camera.lookAt(state.camX, state.inCar ? 2.4 : 2.0, state.camZ);
    }

    function updateInteractionPrompt() {
      let txt = "";

      if (!state.insideInterior && refs.playerCar && dist2D(state.x, state.z, refs.playerCar.position.x, refs.playerCar.position.z) < 8) {
        txt = state.inCar ? "Press F to exit vehicle" : "Press F to enter vehicle";
      }

      if (!txt && state.missionState === "pickup" && refs.pickupMarker && dist2D(state.x, state.z, refs.pickupMarker.position.x, refs.pickupMarker.position.z) < 7) {
        txt = "Press F to pick up package";
      }

      if (!txt && state.missionState === "deliver" && refs.deliveryMarker && dist2D(state.x, state.z, refs.deliveryMarker.position.x, refs.deliveryMarker.position.z) < 7) {
        txt = "Press F to deliver package";
      }

      if (!txt && !state.insideInterior) {
        for (const a of refs.interiorAnchors) {
          if (dist2D(state.x, state.z, a.x, a.z) < 8) {
            txt = `Press F to enter ${a.type}`;
            break;
          }
        }
      }

      if (!txt && state.insideInterior && refs.activeInterior) {
        const dExit = dist2D(state.x, state.z, refs.activeInterior.userData.exit.position.x, refs.activeInterior.userData.exit.position.z);
        if (dExit < 6) txt = "Press F to exit";
      }

      interactionPrompt.textContent = txt;
      interactionPrompt.style.display = txt ? "block" : "none";
    }

    function updateHUD() {
      hud.innerHTML = `
        <strong>GlowCity</strong><br>
        Health: <span class="ok">${Math.floor(state.health)}</span><br>
        Armor: <span class="blue">${Math.floor(state.armor)}</span><br>
        Money: <span class="accent">$${state.money}</span><br>
        Ammo: <span class="warn">${state.ammo}</span> / ${state.reserveAmmo}<br>
        Wanted: <span class="${state.wanted >= 3 ? "danger" : state.wanted >= 1 ? "warn" : "ok"}">${state.wanted}</span><br>
        Level: <span class="accent">${state.level}</span><br>
        XP: <span class="blue">${state.xp}</span><br>
        District: <span class="accent">${state.currentDistrict}</span><br>
        Gang: <span class="accent">${state.playerGang}</span><br>
        Mode: <span class="accent">${state.modeLabel}</span><br>
        Weapon: <span class="warn">${state.weapon}</span><br>
        Online: <span class="accent">${state.onlinePlayers}</span><br>
        FPS: <span class="muted">${state.fps}</span>
      `;
      missionBox.innerHTML = `<strong>${state.insideInterior ? `Inside ${state.interiorType}` : state.missionText}</strong>`;
      radioBox.innerHTML = `<strong>Radio</strong><br><span class="accent">${state.radioName}</span>`;
    }

    function updateMinimap() {
      mini.clearRect(0, 0, 150, 150);
      mini.fillStyle = "#06090d";
      mini.fillRect(0, 0, 150, 150);
      mini.strokeStyle = "rgba(255,255,255,.08)";
      mini.strokeRect(0, 0, 150, 150);

      const scale = 0.25;
      const cx = 75;
      const cy = 75;

      mini.fillStyle = "#ff4d4d";
      mini.fillRect(cx - 2, cy - 2, 4, 4);

      mini.fillStyle = "#ff9748";
      for (const e of state.enemies) {
        const dx = (e.mesh.position.x - state.x) * scale;
        const dz = (e.mesh.position.z - state.z) * scale;
        mini.fillRect(cx + dx - 1.5, cy + dz - 1.5, 3, 3);
      }

      mini.fillStyle = "#cccccc";
      for (const c of state.civilians) {
        const dx = (c.mesh.position.x - state.x) * scale;
        const dz = (c.mesh.position.z - state.z) * scale;
        mini.fillRect(cx + dx - 1, cy + dz - 1, 2, 2);
      }

      if (refs.pickupMarker) {
        mini.fillStyle = "#35e08a";
        const px = (refs.pickupMarker.position.x - state.x) * scale;
        const pz = (refs.pickupMarker.position.z - state.z) * scale;
        mini.fillRect(cx + px - 2, cy + pz - 2, 4, 4);
      }

      if (refs.deliveryMarker) {
        mini.fillStyle = "#ffcb46";
        const dx2 = (refs.deliveryMarker.position.x - state.x) * scale;
        const dz2 = (refs.deliveryMarker.position.z - state.z) * scale;
        mini.fillRect(cx + dx2 - 2, cy + dz2 - 2, 4, 4);
      }
    }

    function saveProgress(now) {
      if (now - state.lastSave < 8000) return;
      localStorage.setItem("bc_health", String(state.health));
      localStorage.setItem("bc_armor", String(state.armor));
      localStorage.setItem("bc_money", String(state.money));
      localStorage.setItem("bc_ammo", String(state.ammo));
      localStorage.setItem("bc_reserveAmmo", String(state.reserveAmmo));
      localStorage.setItem("bc_wanted", String(state.wanted));
      localStorage.setItem("bc_level", String(state.level));
      localStorage.setItem("bc_xp", String(state.xp));
      localStorage.setItem("bc_weapon", state.weapon);
      localStorage.setItem("bc_missionState", state.missionState);
      state.lastSave = now;
    }

    function updateFPS(now) {
      state.__fpsFrames = (state.__fpsFrames || 0) + 1;
      if (!state.__fpsStart) state.__fpsStart = now;
      if (now - state.__fpsStart > 500) {
        state.fps = Math.round((state.__fpsFrames * 1000) / (now - state.__fpsStart));
        state.__fpsFrames = 0;
        state.__fpsStart = now;
      }
    }

    async function initialize() {
      bootFill.style.width = "12%";
      buildGroundShell();

      bootFill.style.width = "28%";
      await loadTemplates();

      bootFill.style.width = "42%";
      buildGLBEnvironment();
      buildPoliceStation();
      buildMissionMarkers();

      bootFill.style.width = "58%";
      buildPlayer();
      buildCar();

      bootFill.style.width = "72%";
      spawnTraffic();
      spawnPeople();

      bootFill.style.width = "84%";
      setupInput();

      bootFill.style.width = "100%";

      state.camX = state.x;
      state.camZ = state.z;
      state.mode = "PLAYING";
      boot.style.display = "none";

      setTimeout(() => {
        if (state.mode !== "PLAYING") {
          state.mode = "PLAYING";
          boot.style.display = "none";
        }
      }, 1500);
    }

    function loop() {
      requestAnimationFrame(loop);
      const delta = Math.min(clock.getDelta(), 0.03);
      const now = performance.now();

      if (state.mode !== "PLAYING") {
        renderer.render(scene, camera);
        return;
      }

      if (!refs.player) {
        renderer.render(scene, camera);
        return;
      }

      updatePlayer(delta);
      updateVehicle();

      refs.player.visible = !state.inCar;

      updateTrafficAndPolice();
      updateCivilians(delta);
      updateEnemies(now);
      updateWorld(delta, now);
      updateCamera();
      updateInteractionPrompt();
      updateHUD();
      updateMinimap();
      updateFPS(now);
      saveProgress(now);

      if (Math.random() < 0.08) renderer.shadowMap.needsUpdate = true;
      renderer.render(scene, camera);
    }

    bootBtn.addEventListener("click", async () => {
      bootBtn.disabled = true;
      try {
        await initialize();
      } catch (e) {
        console.error(e);
        state.mode = "PLAYING";
        boot.style.display = "none";
      }
    });

    window.addEventListener("resize", () => {
      renderer.setSize(innerWidth, innerHeight);
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
    });

    loop();
  </script>
</body>
</html>
