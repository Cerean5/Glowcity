<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Booklyn City AAA</title>

<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial}
#boot{
  position:fixed;inset:0;display:flex;
  align-items:center;justify-content:center;
  background:#000;color:#fff;z-index:10;
}
button{
  padding:15px 30px;
  font-size:18px;
  background:#ff3b3b;
  border:none;border-radius:10px;color:#fff;
}
</style>
</head>

<body>

<div id="boot">
  <button id="startBtn">ENTER CITY</button>
</div>

<canvas id="game"></canvas>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

const canvas = document.getElementById("game");
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0f18);

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2000);

const light = new THREE.DirectionalLight(0xffffff,2);
light.position.set(50,100,50);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff,.5);
scene.add(ambient);

const loader = new GLTFLoader();

let player, car;
let state = {x:0,z:0,rot:0,inCar:false};

function safeLoad(path){
  return new Promise(res=>{
    loader.load(path,g=>res(g.scene),undefined,()=>res(null));
  });
}

function proceduralPlayer(){
  const g=new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );
  g.position.y=1;
  return g;
}

function proceduralCar(){
  const g=new THREE.Mesh(
    new THREE.BoxGeometry(3,1,5),
    new THREE.MeshStandardMaterial({color:0xff0000})
  );
  g.position.y=1;
  return g;
}

async function init(){

  // ground
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(1000,1000),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  ground.rotation.x=-Math.PI/2;
  scene.add(ground);

  // load models
  let playerModel = await safeLoad("./models/player.glb");
  let carModel = await safeLoad("./models/model.glb");

  player = playerModel || proceduralPlayer();
  car = carModel || proceduralCar();

  scene.add(player);
  car.position.set(10,1,10);
  scene.add(car);

  camera.position.set(0,5,10);
}

function update(){

  // movement
  if(keys["w"]) state.z+=0.2;
  if(keys["s"]) state.z-=0.2;
  if(keys["a"]) state.x+=0.2;
  if(keys["d"]) state.x-=0.2;

  player.position.set(state.x,1,state.z);

  camera.position.x = state.x - 5;
  camera.position.z = state.z + 5;
  camera.lookAt(state.x,1,state.z);
}

function loop(){
  requestAnimationFrame(loop);

  if(!player){
    renderer.render(scene,camera);
    return;
  }

  update();
  renderer.render(scene,camera);
}

let keys = {};
window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

document.getElementById("startBtn").onclick = async ()=>{
  document.getElementById("boot").style.display="none";
  await init();
};

window.addEventListener("resize",()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});

loop();
</script>

</body>
</html>
